<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0"/>
<title>SODA · Interactive Component Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--g:#3BD75C;--g2:#5FF088;--dg:#203229;--ch:#0c0d0c;--c1:#161816;--c2:#1d1f1d;--bd:#262826;--bd2:#363936;--pu:#A47BFF;--ye:#FFD23F;--am:#F59E0B;--rd:#FF5470;--t0:#fff;--t1:#c8ccc8;--t2:#74786f;--t3:#3e423e}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--ch);color:var(--t1);line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:var(--g);color:var(--ch)}
.appbar{position:sticky;top:0;z-index:50;background:rgba(10,11,10,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:14px 16px 0}
.appbar .brand{font-family:'DM Mono';font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--g);margin-bottom:3px}
.appbar h1{font-family:'Archivo Black';font-size:19px;color:var(--t0);text-transform:uppercase;letter-spacing:-.01em;line-height:1;margin-bottom:10px}
.search{width:100%;background:var(--c1);border:1px solid var(--bd2);border-radius:11px;padding:11px 14px;color:var(--t0);font-family:'DM Sans';font-size:15px;margin-bottom:10px}
.search:focus{outline:none;border-color:var(--g)}.search::placeholder{color:var(--t3)}
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;font-family:'DM Sans';font-size:13px;font-weight:600;border:1px solid var(--bd2);background:transparent;color:var(--t2);padding:8px 15px;border-radius:100px;cursor:pointer;white-space:nowrap;transition:all .15s}
.tab.on{background:var(--g);color:var(--ch);border-color:var(--g)}
.tab .ct{font-family:'DM Mono';font-size:11px;opacity:.7;margin-left:5px}
.prog-wrap{padding:10px 16px 0}
.prog-row{display:flex;justify-content:space-between;font-family:'DM Mono';font-size:11px;color:var(--t2);margin-bottom:5px}
.prog{height:5px;background:var(--c1);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--g),var(--g2));width:0;transition:width .3s}
.sec-h{padding:24px 16px 6px;font-family:'Archivo Black';font-size:14px;letter-spacing:1px;text-transform:uppercase;color:var(--g)}
.sec-h .sub{display:block;font-family:'DM Mono';font-size:11px;color:var(--t2);letter-spacing:.5px;text-transform:none;margin-top:3px;font-weight:400}
.list{padding:6px 12px 40px}
.card{background:var(--c1);border:1px solid var(--bd);border-radius:15px;margin-bottom:11px;overflow:hidden;transition:border-color .2s}
.card.open{border-color:var(--g)}
.card-head{display:flex;align-items:center;gap:12px;padding:16px 16px;cursor:pointer;user-select:none}
.cnum{font-family:'Archivo Black';font-size:13px;color:var(--ch);background:var(--g);border-radius:7px;padding:5px 8px;line-height:1;flex:0 0 auto}
.card.spec .cnum{background:var(--ye)}
.card-titles{flex:1;min-width:0}
.card-titles h3{font-size:16px;color:var(--t0);font-weight:700;letter-spacing:-.01em;line-height:1.2}
.card-titles .arch{font-family:'DM Mono';font-size:10.5px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.chev{flex:0 0 auto;color:var(--t2);font-size:18px;transition:transform .25s;width:20px;text-align:center}
.card.open .chev{transform:rotate(90deg);color:var(--g)}
.badge{font-family:'DM Mono';font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:100px;flex:0 0 auto}
.badge.built{background:rgba(59,215,92,.13);color:var(--g)}
.badge.spec{background:rgba(255,210,63,.13);color:var(--ye)}
.kind{font-family:'DM Mono';font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:100px;flex:0 0 auto}
.kind.empty{background:rgba(116,120,111,.18);color:var(--t1)}
.kind.loading{background:rgba(245,158,11,.14);color:var(--am)}
.kind.error{background:rgba(255,84,112,.14);color:var(--rd)}
.card-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.card-body-inner{padding:0 16px 18px}
.model{background:#000;border:2px solid var(--bd2);border-radius:18px;padding:8px;margin:4px auto 16px;width:172px}
.model-screen{background:var(--ch);border-radius:11px;overflow:hidden;aspect-ratio:9/16;position:relative}
.model svg{display:block;width:100%;height:100%}
.tapnote{text-align:center;font-family:'DM Mono';font-size:10px;color:var(--t3);margin:-8px 0 14px}
.field{margin-bottom:13px}.field:last-child{margin-bottom:0}
.fl{display:flex;align-items:center;gap:7px;font-family:'DM Mono';font-size:11px;color:var(--g);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.fl .dot{width:6px;height:6px;border-radius:50%;background:var(--g)}
.fv{font-size:14.5px;color:var(--t1);font-weight:300;line-height:1.5}
.card.spec .fl{color:var(--ye)}.card.spec .fl .dot{background:var(--ye)}
.prompt{margin-top:14px;border-left:3px solid var(--pu);background:#141016;border-radius:0 10px 10px 0;padding:12px 14px}
.prompt .pl{font-family:'DM Mono';font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--pu);margin-bottom:7px}
.prompt pre{font-family:'DM Mono';font-size:11px;color:var(--t1);white-space:pre-wrap;line-height:1.5;margin:0}
.empty{text-align:center;padding:60px 20px;color:var(--t2)}.empty .big{font-family:'Archivo Black';font-size:40px;color:var(--t3)}
.foot{padding:30px 20px 50px;text-align:center;border-top:1px solid var(--bd);margin-top:20px}
.foot p{font-size:13px;color:var(--t2);font-style:italic;margin-bottom:8px}
.foot .own{font-family:'DM Mono';font-size:11px;color:var(--t3);font-style:normal}
@media(min-width:560px){.appbar,.prog-wrap,.sec-h,.list,.foot,.ctl-row{max-width:560px;margin-left:auto;margin-right:auto}}
.ctl-row{display:flex;justify-content:space-between;align-items:center;padding:4px 16px 0}
.ctl-btn{font-family:'DM Mono';font-size:11px;color:var(--t2);background:none;border:none;cursor:pointer;padding:6px 0;letter-spacing:.5px}
.ctl-btn:active{color:var(--g)}
</style></head>
<body>
<div class="appbar"><div class="brand">SODA \u2726 INVENTORY</div><h1>Components</h1>
<input class="search" id="search" placeholder="Search components and states..." autocomplete="off"/>
<div class="tabs" id="tabs"></div></div>
<div class="prog-wrap"><div class="prog-row"><span id="prog-label">All</span><span id="prog-count"></span></div><div class="prog"><div class="prog-fill" id="prog-fill"></div></div></div>
<div class="ctl-row"><span class="ctl-btn" style="color:var(--t3)">Tap any item to open</span><button class="ctl-btn" id="toggle-all">Expand all</button></div>
<div id="root"></div>
<div class="foot"><p>A name tag knows you showed up. SODA knows who you became to the room.</p><div class="own">A product of Equalpoint, Inc. Deployed with Futureland Inc. as pilot client.</div></div>
<script>
const COMPONENTS = [{"num": 1, "name": "The Entry QR Code", "part": "Part One: The Attendee Side", "section": null, "fields": {"What it is": "The physical doorway into the whole app. A QR code printed on a card, a table tent, or shown on a screen at the event.", "What the person sees": "A QR code with a short instruction like \"Scan to join the room.\" Nothing else. No app store, no download.", "What it connects to": "Scanning it opens the web app in the phone browser with the event ID already attached, so everything the guest does next is tied to this specific event. It leads directly to the Welcome screen.", "Status": "Built. Present in the survey flow and room demo as the entry point."}, "side": "attendee", "arch": "qr", "kind": null}, {"num": 2, "name": "The Welcome Screen", "part": "Part One: The Attendee Side", "section": null, "fields": {"What it is": "The first screen the guest sees after scanning. The front door of the experience.", "What the person sees": "A warm welcome, the event name, and a single clear button to begin. For a returning guest, this is where recognition happens (see the Returning Guest Recognition component).", "What it connects to": "Comes after the Entry QR. Leads to Sign-In. Reads the event ID from the scan.", "Status": "Built. Present in the room demo as the welcome screen."}, "side": "attendee", "arch": "screen", "kind": null}, {"num": 3, "name": "Sign-In with Email and Code", "part": "Part One: The Attendee Side", "section": null, "fields": {"What it is": "The lightweight way a guest proves who they are, with no password.", "What the person sees": "A field to enter their name and email. Then a screen to type a six-digit code that arrives in their inbox. Once verified, they are in.", "What it connects to": "Comes after Welcome. Sends a code through the email service, checks it, and creates the guest's record for this event. This is the only moment identity is established, and it counts once toward the monthly active user total. Leads to the Photo step.", "Status": "Built. Present in the survey flow and room demo as the email gate and code verification screens."}, "side": "attendee", "arch": "input", "kind": null}, {"num": 4, "name": "The Photo Step", "part": "Part One: The Attendee Side", "section": null, "fields": {"What it is": "An optional profile picture for the guest's card in the room.", "What the person sees": "A circle to add a photo, with a clearly offered skip option. If they skip, the app generates a colored circle with their initials.", "What it connects to": "Comes after Sign-In. Feeds the avatar shown on their card in the Room View and anywhere their identity appears. Leads to the Role step.", "Status": "Built. Present in the room demo as the photo screen with initials-avatar fallback."}, "side": "attendee", "arch": "photo", "kind": null}, {"num": 5, "name": "The Role Chips", "part": "Part One: The Attendee Side", "section": null, "fields": {"What it is": "The first of three tapping steps that build a guest's micro-profile. This one captures who they are.", "What the person sees": "A set of tappable chips for roles like founder, designer, investor, or a write-in option for their own. They tap the one that fits.", "What it connects to": "Comes after Photo. Writes the guest's role to their profile. Feeds matching and the room directory. Leads to the Offer step.", "Status": "Built. Present in the survey flow and room demo as the role selection screen with custom write-in."}, "side": "attendee", "arch": "chips", "kind": null}, {"num": 6, "name": "The Offer Chips", "part": "Part One: The Attendee Side", "section": null, "fields": {"What it is": "The second tapping step. What the guest can give to the room.", "What the person sees": "Tappable chips for things they can offer, an introduction, advice, hiring, investment, with a counter showing how many they have picked and a write-in option.", "What it connects to": "Comes after Role. Writes the guest's offers. These are matched against other people's needs by the matching engine. Leads to the Need step.", "Status": "Built. Present in the survey flow and room demo as the offer chips screen with a count badge."}, "side": "attendee", "arch": "chips", "kind": null}, {"num": 7, "name": "The Need Chips", "part": "Part One: The Attendee Side", "section": null, "fields": {"What it is": "The third tapping step. What the guest is looking for.", "What the person sees": "Tappable chips for what they need, the mirror image of the offer chips, with a counter and write-in.", "What it connects to": "Comes after Offer. Writes the guest's needs. These are matched against other people's offers. Completing this step finishes the ninety-second profile and leads to the Room View.", "Status": "Built. Present in the survey flow and room demo as the need chips screen."}, "side": "attendee", "arch": "chips", "kind": null}, {"num": 8, "name": "The Room View", "part": "Part One: The Attendee Side", "section": null, "fields": {"What it is": "The live directory of everyone present at the event. The heart of the attendee experience.", "What the person sees": "A view of all the people in the room, each as a card showing their photo, name, role, and what they offer and need. There are three ways to look at it: a grid, a list, and a flip-card stack to browse one at a time. A live count shows how many people are present.", "What it connects to": "Comes after the profile is built. Reads every present attendee's profile. It is the surface where the guest sees who else is here, and the canvas the three live acts play out on. Connects to the comment and the three acts.", "Status": "Built. Present in the room demo with grid, list, and flip views and a live counter."}, "side": "attendee", "arch": "grid", "kind": null}, {"num": 9, "name": "The Comment", "part": "Part One: The Attendee Side", "section": null, "fields": {"What it is": "A small way for a guest to react to someone else in the room.", "What the person sees": "A way to leave a short note or reaction on another person's card.", "What it connects to": "Sits on top of the Room View, attached to another attendee's card.", "Status": "Built. Present in the room demo as a comment modal."}, "side": "attendee", "arch": "modal", "kind": null}, {"num": 10, "name": "The Drop (Act 1)", "part": "Part One: The Attendee Side", "section": null, "fields": {"What it is": "The first live act. One question that lands on every phone in the room at the same instant. Technical name: Creative Sync.", "What the person sees": "A prompt appears all at once. The guest answers. Answers rise onto a shared wall, anonymous first, then names attach.", "What it connects to": "Triggered by the host from the Command Center. Broadcasts to every connected phone at once, the moment of peak live connections. Writes each answer and streams them to the shared wall. Feeds conversation starters into The Chance.", "Status": "Built. Present in the creative sync screen as the prompt, the wait state, the wall, and the reveal."}, "side": "attendee", "arch": "broadcast", "kind": null}, {"num": 11, "name": "The Chance (Act 2)", "part": "Part One: The Attendee Side", "section": null, "fields": {"What it is": "The second live act. Soda pairs people up by chance with a reason to talk. Technical name: Random Pairing.", "What the person sees": "The guest is shown a partner, given a conversation starter pulled from the night, and a short countdown timer runs.", "What it connects to": "Triggered by the host. Shuffles the present attendees into pairs and pulls a seed from the Drop answers. Writes the pairings so people are not paired twice. Plays out on the Room View.", "Status": "Built. Present in the creative sync screen as the pairing overlay with the two avatars, names, roles, and timer."}, "side": "attendee", "arch": "pair", "kind": null}, {"num": 12, "name": "The Nudge (Act 3)", "part": "Part One: The Attendee Side", "section": null, "fields": {"What it is": "The third live act and the emotional peak. A private tap on the shoulder telling one guest about one specific person they should meet. Technical name: Quiet Nudge.", "What the person sees": "A private message, seen only by them, naming one person and the reason they should connect. Nothing public, no announcement.", "What it connects to": "Triggered by the host or surfaced by the matching engine. Scores offers against needs and sends the top match to that one guest through a private channel meant only for them. This privacy boundary is the highest-stakes rule in the app: the signal goes only to the recipient, never to any shared view.", "Status": "Built. Present in the creative sync screen as the private nudge overlay with the matched person's card and the reason."}, "side": "attendee", "arch": "private", "kind": null}, {"num": 13, "name": "The Post-Event Survey", "part": "Part One: The Attendee Side", "section": null, "fields": {"What it is": "A short set of questions after the event to capture how the night felt and what the guest needs next.", "What the person sees": "A clean, one-question-at-a-time flow with a progress bar. Question types include star ratings, a sliding scale, tappable tag choices, and a free-text box with a character counter. Back and next buttons move between them.", "What it connects to": "Reached by its own Survey QR or a link in the recap email. Writes survey responses tied to the guest and the event. Feeds the host's survey panel and the intelligence views.", "Status": "Built. Present as a full standalone survey screen with star, scale, tag, and text question types, and in the survey flow as the survey path."}, "side": "attendee", "arch": "form", "kind": null}, {"num": 14, "name": "The Send-Off", "part": "Part One: The Attendee Side", "section": null, "fields": {"What it is": "The warm closing screen after the survey is done.", "What the person sees": "An affirming thank-you, branded for the event, with a soft prompt toward the next event or the membership waitlist.", "What it connects to": "Comes after the survey. Closes the attendee loop.", "Status": "Built. Present in the survey flow and the standalone survey as the completion state."}, "side": "attendee", "arch": "screen", "kind": null}, {"num": 15, "name": "Returning Guest Recognition", "part": "Part One: The Attendee Side", "section": null, "fields": {"What it is": "The moment a known guest scans in to a later event and the app remembers them. The single most important retention moment in the product.", "What the person sees": "Instead of a cold welcome, a message like \"Welcome back. This is your third event. You have made seven connections,\" with their name and avatar already known.", "What it connects to": "Sits on the Welcome screen for returning guests. Reads the guest's history across past events, their attendance count and prior connections. This is the visible face of Community Memory.", "Status": "Built. Present in the survey flow as the recognition screen."}, "side": "attendee", "arch": "screen", "kind": null}, {"num": 16, "name": "The Recap Email", "part": "Part One: The Attendee Side", "section": null, "fields": {"What it is": "The message that arrives after the event so the connection does not evaporate.", "What the person sees": "A branded email with their profile card, a recap link, their matches, and a soft call to action.", "What it connects to": "Sent automatically at event end. Reads the guest's profile and connections. Links back to the survey and the next step.", "Status": "Specified. Described in the build manuals and triggered at event end, not yet a built screen."}, "side": "attendee", "arch": "email", "kind": null}, {"num": 42, "name": "The Lifecycle Message Screen", "part": "Part One: The Attendee Side", "section": null, "fields": {"What it is": "What a guest sees when they scan an event that is not currently live, either before it opens or after it closes.", "What the person sees": "A simple, warm message in the host identity. Before doors open, a not-yet-open note. After the event ends, an event-ended note, with a path to the survey if they have not done it.", "What it connects to": "Reads the event lifecycle state. Appears when the event is in draft or closed rather than live. Wears the host name and logo like every other attendee screen.", "Status": "Specified. Newly surfaced by the Event Layer. A single flexible screen with two text variations, to be specified in the next attendee pass."}, "side": "attendee", "arch": "screen", "kind": null}, {"num": 17, "name": "The Live Stat Bar", "part": "Part Two: The Host Side", "section": "The Command Center", "fields": {"What it is": "The always-visible vital signs of the event.", "What the person sees": "Running counts: how many have scanned in, how many responses are in, how many pairs formed, how many nudges sent, how many surveys completed.", "What it connects to": "Reads live from every part of the event as it happens. Sits across the top of the Command Center.", "Status": "Built. Present in the command center as the live stat counters."}, "side": "command", "arch": "stats", "kind": null}, {"num": 18, "name": "The Room View (Host)", "part": "Part Two: The Host Side", "section": "The Command Center", "fields": {"What it is": "The host's live picture of everyone present.", "What the person sees": "A grid of all attendees with their profiles, mirroring what guests see but for monitoring.", "What it connects to": "Reads every present attendee. The default view of the Command Center.", "Status": "Built. Present in the command center as the room view."}, "side": "command", "arch": "grid", "kind": null}, {"num": 19, "name": "The Sync Control (Drives The Drop)", "part": "Part Two: The Host Side", "section": "The Command Center", "fields": {"What it is": "The panel that fires Act 1 and watches it land.", "What the person sees": "A field to set the prompt, a fire button, a big live timer, a running response count, and the responses feed coming in. A reveal control to attach names.", "What it connects to": "Fires the Drop to every phone. Reads responses as they arrive. Feeds the shared wall.", "Status": "Built. Present in the command center as the sync view with prompt display, timer, response count, and feed."}, "side": "command", "arch": "broadcast", "kind": null}, {"num": 20, "name": "The Chance Control (Drives Act 2)", "part": "Part Two: The Host Side", "section": "The Command Center", "fields": {"What it is": "The panel that runs the random pairing.", "What the person sees": "A spin button to pair the room, a re-spin option, and a status line, plus a grid of the pairs that formed.", "What it connects to": "Triggers the pairing for all present attendees. Writes and displays the pairs.", "Status": "Built. Present in the command center as the roulette view with spin, re-spin, status, and pairs grid."}, "side": "command", "arch": "pair", "kind": null}, {"num": 21, "name": "The Nudge Control (Drives Act 3)", "part": "Part Two: The Host Side", "section": "The Command Center", "fields": {"What it is": "The panel that sends private matches.", "What the person sees": "A queue of pending nudges, each showing who it goes to and why, ready to send.", "What it connects to": "Reads the matching engine's suggestions. Sends each nudge privately to one guest.", "Status": "Built. Present in the command center as the nudge view with the nudge queue."}, "side": "command", "arch": "private", "kind": null}, {"num": 22, "name": "The Survey Monitor (Host)", "part": "Part Two: The Host Side", "section": "The Command Center", "fields": {"What it is": "The host's live read on survey responses.", "What the person sees": "A running table of responses and summary counts as they come in.", "What it connects to": "Reads survey submissions. Feeds the intelligence view.", "Status": "Built. Present in the command center as the survey view with a response table."}, "side": "command", "arch": "form", "kind": null}, {"num": 23, "name": "The Intelligence View", "part": "Part Two: The Host Side", "section": "The Command Center", "fields": {"What it is": "The live read on the shape of the room: what people offer, what they need, where the gaps and overlaps are.", "What the person sees": "Bar charts of the most common offers and needs, and signals about the room's dominant vibe and matchable gaps.", "What it connects to": "Reads all profiles and responses and summarizes them. The analytical layer of the Command Center.", "Status": "Built. Present in the command center as the intel view with offer and need bars."}, "side": "command", "arch": "chart", "kind": null}, {"num": 24, "name": "The Activity Feed", "part": "Part Two: The Host Side", "section": "The Command Center", "fields": {"What it is": "The live ticker of everything happening in the room.", "What the person sees": "A running feed of events: scans, responses, matches, as they occur.", "What it connects to": "Reads live activity from across the event.", "Status": "Built. Present in the command center as the activity feed."}, "side": "command", "arch": "feed", "kind": null}, {"num": 25, "name": "The Connection Status Badge", "part": "Part Two: The Host Side", "section": "The Command Center", "fields": {"What it is": "The small indicator that the live system is connected and healthy.", "What the person sees": "A badge showing the realtime link is active.", "What it connects to": "Monitors the live connection that powers the Drop and the Nudge.", "Status": "Built. Present in the command center as the sync badge."}, "side": "command", "arch": "stats", "kind": null}, {"num": 38, "name": "Lifecycle State Awareness", "part": "Part Two: The Host Side", "section": "The Command Center", "fields": {"What it is": "The Command Center's awareness of whether the event is in draft, live, or closed, which governs what the host can fire.", "What the person sees": "A clear state indicator showing the event is live, and act controls that are active only when live. Before going live or after closing, the controls are visibly inert.", "What it connects to": "Reads the event lifecycle state set in the Admin. The acts can only fire when the event is live, so this is the gate that protects the night from misfires.", "Status": "Specified. Defined in the Event Layer. The Command Center reads the lifecycle rather than managing it."}, "side": "command", "arch": "lifecycle", "kind": null}, {"num": 26, "name": "Event Setup and Active Event", "part": "Part Two: The Host Side", "section": "The Admin Panel", "fields": {"What it is": "Where the host defines and selects the event being run.", "What the person sees": "The active event name and its settings at the top of the panel.", "What it connects to": "Sets the event ID that scopes everything. Feeds every other component.", "Status": "Built. Present in the admin panel as the active event header."}, "side": "admin", "arch": "setup", "kind": null}, {"num": 39, "name": "Event Creation", "part": "Part Two: The Host Side", "section": "The Admin Panel", "fields": {"What it is": "The action of starting a brand-new event, the front of the event layer.", "What the person sees": "A way to create an event with a required name and a date, beginning it in the draft state.", "What it connects to": "Creates the event record that scopes all attendee activity and feeds the per-event QR. Defined in the Event Layer.", "Status": "Specified. Newly defined in the Event Layer. The admin has a partial active-event header today; full creation is the next build."}, "side": "admin", "arch": "setup", "kind": null}, {"num": 40, "name": "Host Identity and Branding", "part": "Part Two: The Host Side", "section": "The Admin Panel", "fields": {"What it is": "Where each event gets its own identity, the brand-agnostic core of the platform.", "What the person sees": "A required write-in field for the host or organization name, and an optional logo upload. Both start empty so each event is filled in fresh. A typed name alone produces a complete attendee experience.", "What it connects to": "Feeds the host name and logo to every attendee-facing screen, the Entry QR eyebrow, the Welcome, and the Send-Off, which read these fields rather than showing anything hardcoded.", "Status": "Specified. Newly defined in the Event Layer. This is the feature that makes the app brand-agnostic."}, "side": "admin", "arch": "brand", "kind": null}, {"num": 41, "name": "Event Lifecycle Control", "part": "Part Two: The Host Side", "section": "The Admin Panel", "fields": {"What it is": "Where the host moves an event through its three states: draft, live, and closed.", "What the person sees": "A clear control to take a draft event live, and later to close it. The identity fields are open in draft, locked in live, and final in closed.", "What it connects to": "Sets the state the Command Center reads to know when the acts can fire, and the state the attendee QR reads to show the live experience, a not-yet-open message, or an event-ended message.", "Status": "Specified. Newly defined in the Event Layer as the third setting that was missing."}, "side": "admin", "arch": "lifecycle", "kind": null}, {"num": 27, "name": "The Check-In Panel", "part": "Part Two: The Host Side", "section": "The Admin Panel", "fields": {"What it is": "Manual check-in and on-the-spot profile entry, for when someone needs help getting in.", "What the person sees": "Fields to enter a guest's name, email, role, offers, and needs by hand.", "What it connects to": "Writes a guest profile directly, the same as if they had scanned in.", "Status": "Built. Present in the admin panel as the check-in panel with manual chip entry."}, "side": "admin", "arch": "panel", "kind": null}, {"num": 28, "name": "The Chip Queue and Moderation", "part": "Part Two: The Host Side", "section": "The Admin Panel", "fields": {"What it is": "The place to review and approve write-in chips guests created, keeping the shared vocabulary clean.", "What the person sees": "A queue of pending custom chips ault set always appears as a floor, plus the write-in option, so the guest can always proceed.", "What it connects to": "A state of Chip Steps.", "Status": "Specified. Defined in the empty, loading, and error states pass."}}, {"num": 52, "name": "Empty State: The Waiting Wall", "side": "states", "arch": "waiting", "kind": "Empty", "parent": "The Drop", "fields": {"What it is": "The window after the host fires the prompt but before answers land.", "What the person sees": "The question holds the screen with an inviting empty wall beneath it, framed so the guest feels first. Suggested copy: “Answers are landing. Yours can be first.”", "What it connects to": "A state of The Drop.", "Status": "Specified. Defined in the empty, loading, and error states pass."}, "prompt": ["Design a mobile screen, dark mode, background near-black #111111. This is \"The Drop\" in its WAITING", "state, after the host fires the prompt but before answers arrive. One job: invite the first answer.", "Top: small uppercase monospace eyebrow in Soda green #3BD75C, \"THE DROP\".", "Center, dominant: the question in large bold condensed uppercase display type, white. Below it a", "single text input, dark #1A1A1A with a 1px border #262826, with a green focus border.", "Below the input: an empty wall area with one soft line of muted grey body text, \"Answers are", "landing. Yours can be first.\"", "Bottom: full-width Soda green button \"SEND IT\". Calm and inviting, not blank. 8px grid, 16px margins."]}, {"num": 53, "name": "Loading State: Prompt Arriving", "side": "states", "arch": "loading", "kind": "Loading", "parent": "The Drop", "fields": {"What it is": "The prompt arriving on the guest phone as the host fires it.", "What the person sees": "A brief beat as the question animates in, with the input ready the instant it lands.", "What it connects to": "A state of The Drop.", "Status": "Specified. Defined in the empty, loading, and error states pass."}}, {"num": 54, "name": "Empty State: The Unpaired ned in the empty, loading, and error states pass."}}, {"num": 63, "name": "Empty State: The Feed at Start", "side": "states", "arch": "feed", "kind": "Empty", "parent": "Activity Feed", "fields": {"What it is": "Nothing has happened in the event yet.", "What the person sees": "A quiet placeholder line so the feed reads as ready rather than stalled. Suggested copy: “The night starts here.”", "What it connects to": "A state of Activity Feed.", "Status": "Specified. Defined in the empty, loading, and error states pass."}}, {"num": 64, "name": "Empty State: Awaiting Responses", "side": "states", "arch": "waiting", "kind": "Empty", "parent": "Sync Control", "fields": {"What it is": "The host has fired the prompt and no responses are in yet.", "What the person sees": "A response count at zero and an empty feed framed as waiting, mirroring what guests see. Suggested copy: “Waiting on the first answer.”", "What it connects to": "A state of Sync Control.", "Status": "Specified. Defined in the empty, loading, and error states pass."}}, {"num": 65, "name": "Empty State: Too Few to Pair", "side": "states", "arch": "unpaired", "kind": "Empty", "parent": "Chance Control", "fields": {"What it is": "The host tries to pair a room too small or odd to pair cleanly.", "What the person sees": "A clear note on why pairing is limited and how the unpaired guest is held, so the host understands the room. Suggested copy: “Room is small. One guest will hold for the next round.”", "What it connects to": "A state of Chance Control.", "Status": "Specified. Defined in the empty, loading, and error states pass."}}, {"num": 66, "name": "Empty State: Empty Queue", "side": "states", "arch": "empty", "kind": "Empty", "parent": "Nudge Control", "fields": {"What it is": "No matches are ready to send yet.", "What the person sees": "A queue at zero with a calm line, so the host knows matches surface as profiles fill in. Suggested copy: “No matches ready to send yet.”", "What it connects to": "A state of N te of Chip Queue.", "Status": "Specified. Defined in the empty, loading, and error states pass."}}, {"num": 71, "name": "Empty State: Before Data", "side": "states", "arch": "zero-dash", "kind": "Empty", "parent": "Matches and Survey Panels", "fields": {"What it is": "The event has not produced matches or survey responses yet.", "What the person sees": "Zero states that match the Command Center, framed as the night being early. Suggested copy: “Nothing here yet. It fills as the event runs.”", "What it connects to": "A state of Matches and Survey Panels.", "Status": "Specified. Defined in the empty, loading, and error states pass."}}, {"num": 72, "name": "Loading State: Preparing Export", "side": "states", "arch": "loading", "kind": "Loading", "parent": "Export Panel", "fields": {"What it is": "An export is being prepared.", "What the person sees": "A calm working state with the control locked until the file is ready. Suggested copy: “Preparing your export.”", "What it connects to": "A state of Export Panel.", "Status": "Specified. Defined in the empty, loading, and error states pass."}}, {"num": 73, "name": "Empty State: Nothing to Export", "side": "states", "arch": "empty", "kind": "Empty", "parent": "Export Panel", "fields": {"What it is": "An event with no activity has nothing to export.", "What the person sees": "A plain note rather than an empty file, so the host knows the event has no data. Suggested copy: “No data to export yet.”", "What it connects to": "A state of Export Panel.", "Status": "Specified. Defined in the empty, loading, and error states pass."}}];

    case 'qr': return f+`<rect x='28' y='52' width='44' height='44' rx='4' fill='${W}'/>`+qrdots()+`<text x='50' y='118' fill='${G}' font-size='7' text-anchor='middle' font-family='monospace'>SCAN</text>`;
    case 'input': return f+bar+`<rect x='16' y='60' width='68' height='13' rx='4' fill='${C}' stroke='${G}' stroke-width='1'/>`+`<rect x='16' y='80' width='68' height='13' rx='4' fill='${C}'/>`+`<rect x='16' y='104' width='68' height='12' rx='6' fill='${G}'/>`;
    case 'photo': return f+`<circle cx='50' cy='62' r='22' fill='${C}' stroke='${G}' stroke-width='1.5'/>`+`<circle cx='50' cy='55' r='7' fill='${D}'/><path d='M38 78 Q50 66 62 78' fill='${D}'/>`+`<rect x='30' y='98' width='40' height='10' rx='5' fill='${G}'/>`;
    case 'chips': return f+bar+chips([[16,40,28,G],[48,40,24,C],[16,54,20,C],[40,54,30,G],[16,68,34,C],[54,68,22,G]]);
    case 'grid': return f+bar+grid();
    case 'modal': return f+grid(.4)+`<rect x='14' y='58' width='72' height='62' rx='8' fill='${C}' stroke='${G}' stroke-width='1'/>`+`<circle cx='26' cy='72' r='6' fill='${G}'/><rect x='38' y='69' width='38' height='4' rx='2' fill='${D}'/>`+`<rect x='22' y='88' width='56' height='4' rx='2' fill='${D}'/><rect x='22' y='96' width='44' height='4' rx='2' fill='${D}'/>`;
    case 'broadcast': return f+bar+`<circle cx='50' cy='40' r='6' fill='${G}'/>`+[22,30,14].map((r,i)=>`<circle cx='50' cy='40' r='${14+i*12}' fill='none' stroke='${G}' stroke-width='1' opacity='${.5-i*.13}'/>`).join('')+`<rect x='20' y='96' width='60' height='8' rx='4' fill='${C}'/><rect x='20' y='108' width='44' height='8' rx='4' fill='${C}'/>`;
    case 'pair': return f+bar+`<circle cx='32' cy='60' r='13' fill='${C}' stroke='${G}' stroke-width='1.5'/>`+`<circle cx='68' cy='60' r='13' fill='${C}' stroke='${G}' stroke-width='1.5'/>`+`<path d='M45 60 H55' stroke='${G}' stroke-width='2'/>`+`<rect x='30' y='92' width='40' height='9' rx='4.5' fill='${Y}'/><text x='50' y='99' fill='${BG}' font-size='6' text-anchor='middle' font-family='monospace'>0:30</text>`;
    case 'private': return f+grid(.35)+`<rect x='18' y='66' width='64' height='46' rx='9' fill='${C}' stroke='${P}' stroke-width='1.5'/>`+`<circle cx='32' cy='84' r='8' fill='${P}'/><rect x='46' y='78' width='30' height='4' rx='2' fill='${W}'/>`+`<rect x='30' y='98' width='40' height='3' rx='1.5' fill='${D}'/>`+`<text x='50' y='60' fill='${P}' font-size='6' text-anchor='middle' font-family='monospace'>PRIVATE</text>`;
    case 'form': return f+bar+`<rect x='16' y='30' width='50' height='5' rx='2' fill='${D}'/>`+stars()+`<rect x='16' y='84' width='68' height='20' rx='5' fill='${C}'/>`+`<rect x='16' y='112' width='30' height='10' rx='5' fill='${G}'/>`;
    case 'email': return f+`<rect x='16' y='44' width='68' height='52' rx='6' fill='${C}' stroke='${G}' stroke-width='1'/>`+`<path d='M16 50 L50 74 L84 50' fill='none' stroke='${G}' stroke-width='1.5'/>`+`<rect x='24' y='104' width='52' height='8' rx='4' fill='${G}'/>`;
    case 'screen': return f+bar+`<circle cx='50' cy='52' r='4' fill='${G}'/>`+`<rect x='22' y='68' width='56' height='6' rx='3' fill='${W}'/><rect x='30' y='80' width='40' height='4' rx='2' fill='${D}'/>`+`<rect x='28' y='100' width='44' height='11' rx='5.5' fill='${G}'/>`;
    case 'stats': return f+bar+statcards('142');
    case 'control': return f+bar+`<rect x='16' y='30' width='68' height='14' rx='4' fill='${C}'/>`+`<rect x='16' y='50' width='32' height='11' rx='5.5' fill='${G}'/><rect x='52' y='50' width='32' height='11' rx='5.5' fill='${C}' stroke='${D}' stroke-width='.5'/>`+`<text x='50' y='86' fill='${G}' font-size='15' text-anchor='middle' font-family='Arial' font-weight='bold'>0:45</text>`+`<rect x='16' y='98' width='68' height='4' rx='2' fill='${C}'/><rect x='16' y='98' width='40' height='4' rx='2' fill='${G}'/>`;
    case 'chart': return f+bar+barchart();
    case 'feed': return f+bar+feed(true);
    case 'badge': return f+bar+`<circle cx='50' cy='62' r='14' fill='none' stroke='${G}' stroke-width='2'/>`+`<circle cx='50' cy='62' r='5' fill='${G}'/><text x='50' y='92' fill='${G}' font-size='7' text-anchor='middle' font-family='monospace'>LIVE</text>`;
    case 'panel': return f+bar+`<rect x='12' y='26' width='20' height='90' rx='4' fill='${C}'/>`+`<rect x='16' y='32' width='12' height='4' rx='2' fill='${G}'/><rect x='16' y='42' width='12' height='4' rx='2' fill='${D}'/><rect x='16' y='52' width='12' height='4' rx='2' fill='${D}'/>`+`<rect x='38' y='26' width='50' height='26' rx='4' fill='${C}'/><rect x='38' y='56' width='50' height='26' rx='4' fill='${C}'/><rect x='38' y='86' width='50' height='26' rx='4' fill='${C}'/>`;
    case 'editor': return f+bar+`<rect x='16' y='34' width='68' height='30' rx='5' fill='${C}' stroke='${G}' stroke-width='1'/>`+`<rect x='22' y='42' width='40' height='4' rx='2' fill='${D}'/><rect x='22' y='52' width='30' height='4' rx='2' fill='${D}'/>`+`<rect x='16' y='72' width='20' height='9' rx='4.5' fill='${C}'/><rect x='40' y='72' width='20' height='9' rx='4.5' fill='${G}'/>`;
    case 'export': return f+bar+`<rect x='30' y='40' width='40' height='50' rx='4' fill='${C}'/>`+`<path d='M50 52 V76 M42 68 L50 76 L58 68' stroke='${G}' stroke-width='2' fill='none'/>`+`<rect x='24' y='100' width='52' height='10' rx='5' fill='${G}'/>`;
    case 'setup': return f+bar+`<text x='50' y='30' fill='${G}' font-size='6' text-anchor='middle' font-family='monospace'>NEW EVENT</text>`+`<rect x='16' y='40' width='68' height='13' rx='4' fill='${C}' stroke='${G}' stroke-width='1'/>`+`<rect x='22' y='44' width='30' height='5' rx='2' fill='${D}'/>`+`<rect x='16' y='60' width='68' height='13' rx='4' fill='${C}'/>`+`<rect x='16' y='104' width='68' height='12' rx='6' fill='${G}'/>`;
    case 'brand': return f+bar+`<rect x='16' y='34' width='68' height='13' rx='4' fill='${C}' stroke='${G}' stroke-width='1'/><rect x='22' y='38' width='42' height='5' rx='2' fill='${W}'/>`+`<text x='80' y='32' fill='${G}' font-size='5' text-anchor='end' font-family='monospace'>REQ</text>`+`<rect x='16' y='56' width='68' height='40' rx='6' fill='none' stroke='${D}' stroke-width='1' stroke-dasharray='3 3'/>`+`<path d='M50 70 V84 M43 77 L50 70 L57 77' stroke='${D}' stroke-width='1.5' fill='none'/>`+`<text x='50' y='92' fill='${D}' font-size='5' text-anchor='middle' font-family='monospace'>LOGO OPTIONAL</text>`;
    case 'lifecycle': return f+bar+`<circle cx='24' cy='50' r='7' fill='${D}'/><text x='24' y='66' fill='${D}' font-size='5' text-anchor='middle' font-family='monospace'>DRAFT</text>`+`<circle cx='50' cy='50' r='9' fill='${G}'/><text x='50' y='68' fill='${G}' font-size='5' text-anchor='middle' font-family='monospace'>LIVE</text>`+`<circle cx='76' cy='50' r='7' fill='${C}' stroke='${D}' stroke-width='1'/><text x='76' y='66' fill='${D}' font-size='5' text-anchor='middle' font-family='monospace'>CLOSED</text>`+`<path d='M31 50 H41 M59 50 H69' stroke='${D}' stroke-width='1'/>`+`<rect x='16' y='92' width='68' height='10' rx='5' fill='${G}'/><text x='50' y='100' fill='${BG}' font-size='6' text-anchor='middle' font-family='monospace'>GO LIVE</text>`;
    case 'toast': return f+grid(.4)+`<rect x='14' y='130' width='72' height='20' rx='8' fill='${C}' stroke='${G}' stroke-width='1'/>`+`<circle cx='26' cy='140' r='4' fill='${G}'/><rect x='36' y='138' width='40' height='4' rx='2' fill='${W}'/>`;
    /* ---- state archetypes ---- */
    case 'empty-room': return f+`<rect x='10' y='8' width='44' height='5' rx='2.5' fill='${C}'/>`+`<circle cx='80' cy='10' r='3' fill='${G}'/><text x='74' y='13' fill='${G}' font-size='6' text-anchor='end' font-family='monospace'>3</text>`+`<rect x='16' y='28' width='60' height='7' rx='3' fill='${W}'/><rect x='16' y='40' width='44' height='4' rx='2' fill='${D}'/>`+`<rect x='16' y='56' width='32' height='30' rx='5' fill='${C}'/><circle cx='25' cy='66' r='5' fill='${G}'/>`+`<rect x='52' y='56' width='32' height='30' rx='5' fill='none' stroke='${D}' stroke-width='1' stroke-dasharray='3 3'/>`+`<rect x='16' y='92' width='32' height='30' rx='5' fill='none' stroke='${D}' stroke-width='1' stroke-dasharray='3 3'/>`+`<rect x='52' y='92' width='32' height='30' rx='5' fill='none' stroke='${D}' stroke-width='1' stroke-dasharray='3 3'/>`;
    case 'waiting': return f+`<text x='50' y='24' fill='${G}' font-size='6' text-anchor='middle' font-family='monospace'>THE DROP</text>`+`<rect x='16' y='34' width='68' height='6' rx='3' fill='${W}'/><rect x='16' y='44' width='52' height='6' rx='3' fill='${W}'/>`+`<rect x='16' y='58' width='68' height='13' rx='4' fill='${C}' stroke='${G}' stroke-width='1'/>`+`<rect x='16' y='84' width='68' height='38' rx='6' fill='none' stroke='${D}' stroke-width='1' stroke-dasharray='3 3'/>`+`<text x='50' y='106' fill='${D}' font-size='5.5' text-anchor='middle' font-family='monospace'>YOURS CAN BE FIRST</text>`;
    case 'unpaired': return f+bar+`<circle cx='50' cy='54' r='15' fill='${C}' stroke='${G}' stroke-width='1.5'/><circle cx='50' cy='48' r='6' fill='${D}'/><path d='M40 66 Q50 56 60 66' fill='${D}'/>`+`<rect x='28' y='86' width='44' height='11' rx='5.5' fill='${Y}'/><text x='50' y='94' fill='${BG}' font-size='5.5' text-anchor='middle' font-family='monospace'>NEXT ROUND</text>`+`<rect x='30' y='104' width='40' height='3' rx='1.5' fill='${D}'/>`;
    case 'no-match': return f+grid(.3)+`<rect x='18' y='64' width='64' height='48' rx='9' fill='${C}' stroke='${P}' stroke-width='1.5'/>`+`<text x='50' y='58' fill='${P}' font-size='5.5' text-anchor='middle' font-family='monospace'>FOR YOU</text>`+`<rect x='28' y='78' width='44' height='4' rx='2' fill='${W}'/><rect x='28' y='86' width='44' height='3' rx='1.5' fill='${D}'/><rect x='28' y='92' width='30' height='3' rx='1.5' fill='${D}'/>`+`<rect x='28' y='100' width='44' height='8' rx='4' fill='${G}'/>`;
    case 'loading': return f+bar+`<rect x='16' y='30' width='68' height='12' rx='4' fill='${C}'/><rect x='16' y='48' width='54' height='12' rx='4' fill='${C}'/><rect x='16' y='66' width='68' height='12' rx='4' fill='${C}'/><rect x='16' y='84' width='40' height='12' rx='4' fill='${C}'/>`+`<circle cx='50' cy='120' r='7' fill='none' stroke='${G}' stroke-width='2' stroke-dasharray='22 10'/>`;
    case 'error': return f+bar+`<circle cx='50' cy='48' r='13' fill='none' stroke='${RD}' stroke-width='2'/><text x='50' y='53' fill='${RD}' font-size='16' text-anchor='middle' font-family='Arial' font-weight='bold'>!</text>`+`<rect x='20' y='74' width='60' height='4' rx='2' fill='${RD}' opacity='.6'/><rect x='28' y='82' width='44' height='4' rx='2' fill='${D}'/>`+`<rect x='28' y='98' width='44' height='11' rx='5.5' fill='${G}'/><text x='50' y='106' fill='${BG}' font-size='5.5' text-anchor='middle' font-family='monospace'>RETRY</text>`;
    case 'reconnect': return f+grid(.3)+`<circle cx='50' cy='64' r='12' fill='none' stroke='${AM}' stroke-width='2' stroke-dasharray='30 12'/>`+`<text x='50' y='92' fill='${AM}' font-size='6' text-anchor='middle' font-family='monospace'>RECONNECTING</text>`;
    case 'zero-dash': return f+bar+statcards('0','0','0',D)+`<text x='84' y='120' fill='${D}' font-size='5.5' text-anchor='end' font-family='monospace'>WAITING</text>`;
    case 'empty': return f+bar+`<rect x='28' y='44' width='44' height='30' rx='6' fill='none' stroke='${D}' stroke-width='1' stroke-dasharray='3 3'/>`+`<path d='M42 59 H58' stroke='${D}' stroke-width='1.5'/>`+`<rect x='26' y='90' width='48' height='4' rx='2' fill='${D}'/><rect x='34' y='99' width='32' height='3' rx='1.5' fill='${C}'/>`;
    default: return f+bar+grid();
  }
  function qrdots(){let s='';for(let i=0;i<5;i++)for(let j=0;j<5;j++){if((i*j+i+j)%2===0)s+=`<rect x='${32+j*8}' y='${56+i*8}' width='5' height='5' fill='#000'/>`;}return s;}
  function chips(arr){return arr.map(([x,y,w,c])=>`<rect x='${x}' y='${y}' width='${w}' height='9' rx='4.5' fill='${c}'/>`).join('');}
  function grid(op){const o=op||1;let s='';for(let i=0;i<3;i++)for(let j=0;j<2;j++){const x=16+j*36,y=24+i*34;s+=`<g opacity='${o}'><rect x='${x}' y='${y}' width='32' height='30' rx='5' fill='${C}'/><circle cx='${x+9}' cy='${y+10}' r='5' fill='${G}'/><rect x='${x+6}' y='${y+20}' width='20' height='3' rx='1.5' fill='${D}'/></g>`;}return s;}
  function stars(){let s='';for(let i=0;i<5;i++){s+=`<circle cx='${24+i*13}' cy='52' r='4' fill='${i<3?Y:C}'/>`;}return s;}
  function statcards(a,b,c2,col){const v=[a||'142',b||'38',c2||'27'];const cl=col||G;let s='';for(let i=0;i<3;i++){const y=26+i*30;s+=`<rect x='16' y='${y}' width='68' height='24' rx='5' fill='${C}'/><text x='24' y='${y+17}' fill='${cl}' font-size='13' font-family='Arial' font-weight='bold'>${v[i]}</text>`;}return s;}
  function barchart(){const h=[30,46,22,38,16];let s='';h.forEach((hh,i)=>{s+=`<rect x='${18+i*14}' y='${110-hh}' width='10' height='${hh}' rx='2' fill='${i%2?G:P}'/>`;});return s+`<rect x='16' y='112' width='68' height='1' fill='${D}'/>`;}
  function feed(){let s='';for(let i=0;i<4;i++){const y=28+i*22;s+=`<circle cx='24' cy='${y+6}' r='5' fill='${i===0?G:C}'/><rect x='34' y='${y+2}' width='48' height='4' rx='2' fill='${D}'/><rect x='34' y='${y+9}' width='32' height='3' rx='1.5' fill='${C}'/>`;}return s;}
}

function render(){
  const root=document.getElementById('root');
  const q=query.trim().toLowerCase();
  let list=COMPONENTS.filter(c=>{
    const sideOk=activeSide==='all'||c.side===activeSide;
    const qOk=!q||c.name.toLowerCase().includes(q)||Object.values(c.fields).join(' ').toLowerCase().includes(q)||(c.arch||'').includes(q)||(c.kind||'').toLowerCase().includes(q)||(c.parent||'').toLowerCase().includes(q);
    return sideOk&&qOk;
  });
  document.getElementById('prog-count').textContent=list.length+' / '+COMPONENTS.length;
  document.getElementById('prog-fill').style.width=(list.length/COMPONENTS.length*100)+'%';
  document.getElementById('prog-label').textContent=activeSide==='all'?'All':SIDE_TITLES[activeSide][0];
  if(list.length===0){root.innerHTML=`<div class='empty'><div class='big'>0</div><p>No items match "${q}"</p></div>`;return;}
  let html='';
  const groups=activeSide==='all'?['attendee','command','admin','states']:[activeSide];
  groups.forEach(side=>{
    const items=list.filter(c=>c.side===side);
    if(!items.length)return;
    const [t,s]=SIDE_TITLES[side];
    html+=`<div class='sec-h'>${t}<span class='sub'>${s}</span></div><div class='list'>`;
    items.forEach(c=>{
      const open=allOpen||openSet.has(c.num);
      const built=/Built/.test(c.fields['Status']);
      const kindTag=c.kind?`<span class='kind ${c.kind.toLowerCase()}'>${c.kind}</span>`:'';
      const promptHtml=c.prompt?`<div class='prompt'><div class='pl'>Paste-ready Claude Design prompt</div><pre>${c.prompt.join('\n').replace(/</g,'&lt;')}</pre></div>`:'';
      html+=`<div class='card ${open?'open':''} ${built?'':'spec'}' data-num='${c.num}'>
        <div class='card-head' onclick='toggle(${c.num})'>
          <span class='cnum'>${String(c.num).padStart(2,'0')}</span>
          <div class='card-titles'><h3>${c.name}</h3><div class='arch'>${c.parent?c.parent+' \u00b7 ':''}${c.arch} model</div></div>
          ${kindTag}<span class='badge ${built?'built':'spec'}'>${built?'Built':'Spec'}</span><span class='chev'>\u203A</span>
        </div>
        <div class='card-body' id='body-${c.num}'><div class='card-body-inner'>
          <div class='model'><div class='model-screen'><svg viewBox='0 0 100 178' xmlns='http://www.w3.org/2000/svg'>${model(c.arch)}</svg></div></div>
          <div class='tapnote'>interactive model \u00b7 ${c.arch}</div>
          ${field('What it is',c.fields['What it is'])}
          ${field('What the person sees',c.fields['What the person sees'])}
          ${field('What it connects to',c.fields['What it connects to'])}
          ${field('Status',c.fields['Status'])}
          ${promptHtml}
        </div></div></div>`;
    });
    html+=`</div>`;
  });
  root.innerHTML=html;
  list.forEach(c=>{if(allOpen||openSet.has(c.num))setBody(c.num,true);});
}
function field(label,val){return `<div class='field'><div class='fl'><span class='dot'></span>${label}</div><div class='fv'>${val||''}</div></div>`;}
function setBody(num,open){const b=document.getElementById('body-'+num);if(!b)return;b.style.maxHeight=open?b.scrollHeight+'px':'0';}
function toggle(num){const card=document.querySelector(`.card[data-num='${num}']`);const isOpen=card.classList.contains('open');if(isOpen){card.classList.remove('open');openSet.delete(num);setBody(num,false);}else{card.classList.add('open');openSet.add(num);setBody(num,true);}}
window.toggle=toggle;
function buildTabs(){const wrap=document.getElementById('tabs');wrap.innerHTML=SIDES.map(s=>{const ct=s.id==='all'?COMPONENTS.length:COMPONENTS.filter(c=>c.side===s.id).length;return `<button class='tab ${s.id===activeSide?'on':''}' data-side='${s.id}'>${s.label}<span class='ct'>${ct}</span></button>`;}).join('');wrap.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{activeSide=t.dataset.side;openSet.clear();allOpen=false;document.getElementById('toggle-all').textContent='Expand all';buildTabs();render();});}
document.getElementById('search').addEventListener('input',e=>{query=e.target.value;render();});
document.getElementById('toggle-all').onclick=function(){allOpen=!allOpen;this.textContent=allOpen?'Collapse all':'Expand all';if(!allOpen)openSet.clear();render();};
buildTabs();render();
</script></body></html>
