<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#111111">
<title>SODA, Swipe the Room</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Caveat:wght@600&display=swap');
  :root{
    --canvas:#111;--card:#1a1a1a;--surface:#202220;--border:#2a2a2a;
    --green:#3bd75c;--ink:#f5f5f5;--muted:#8a8a8a;--hint:#5a5a5a;--purple:#a47bff;
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#000;color:var(--ink);font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:20px;overflow:hidden}
  .mono{font-family:'DM Mono',monospace;letter-spacing:.14em;text-transform:uppercase}
  .display{font-family:'Archivo Black',sans-serif;text-transform:uppercase;letter-spacing:-.02em;line-height:1.04}
  .device{width:392px;height:800px;max-height:calc(100dvh - 40px);background:var(--canvas);border-radius:30px;overflow:hidden;position:relative;display:flex;flex-direction:column;box-shadow:0 0 0 1px var(--border),0 40px 80px rgba(0,0,0,.65)}
  @media (max-width:430px){body{padding:0}.device{width:100vw;height:100dvh;max-height:none;border-radius:0}}

  .topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
  .live{display:flex;align-items:center;gap:7px;color:var(--green);font-size:10px}
  .live i{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(59,215,92,.5)}70%{box-shadow:0 0 0 6px rgba(59,215,92,0)}100%{box-shadow:0 0 0 0 rgba(59,215,92,0)}}

  .head{padding:16px 20px 6px;flex-shrink:0;display:flex;justify-content:space-between;align-items:flex-end}
  .head .eyebrow{color:var(--green);font-size:11px;font-family:'DM Mono';letter-spacing:.14em;text-transform:uppercase;margin-bottom:5px}
  .head h2{font-size:26px}
  .head .counter{color:var(--muted);font-size:12px;font-family:'DM Mono';letter-spacing:.08em}

  /* swipe deck */
  .deck{flex:1;position:relative;overflow:hidden;margin:8px 0}
  .track{position:absolute;inset:0;display:flex;will-change:transform}
  .slide{min-width:100%;height:100%;padding:6px 20px 12px;display:flex;flex-direction:column}

  .biz{background:var(--card);border:1px solid var(--border);border-radius:24px;flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
  .biz.match{border-color:rgba(164,123,255,.45)}
  .biz-head{display:flex;justify-content:space-between;align-items:flex-start;padding:20px 22px 0}
  .soda-mark{position:relative;width:32px;height:32px;flex-shrink:0}
  .soda-mark i{position:absolute;border-radius:50%;background:var(--green)}
  .soda-mark .d1{width:10px;height:10px;top:0;left:2px}.soda-mark .d2{width:12px;height:12px;top:3px;right:0}.soda-mark .d3{width:16px;height:16px;bottom:0;left:5px}
  .agency{text-align:right;line-height:1}
  .agency .nm{color:var(--green);font-size:22px;font-weight:600;font-family:'DM Sans'}
  .agency .ty{color:var(--muted);font-size:11px;font-style:italic;letter-spacing:.1em;margin-top:3px}
  .biz-body{flex:1;padding:6px 22px;overflow-y:auto;display:flex;flex-direction:column}

  .me-face{flex:1;display:flex;flex-direction:column;justify-content:center}
  .me-name{color:var(--green);font-family:'Archivo Black';font-size:46px;letter-spacing:-.02em;line-height:.9}
  .me-role{color:var(--muted);font-size:17px;font-style:italic;margin-top:6px}
  .sig{margin-top:auto;padding-bottom:6px}
  .sig .nm{color:var(--green);font-family:'Caveat',cursive;font-size:30px;line-height:1;border-bottom:2px solid var(--green);padding-bottom:2px}
  .sig .lbl{color:var(--green);font-size:10px;margin-top:4px}

  .face-name{color:var(--green);font-family:'Archivo Black';font-size:24px;margin:4px 0 12px}
  .face-section{color:var(--muted);font-size:14px;font-style:italic;margin:6px 0 9px}
  .biz-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
  .biz-chip{background:var(--green);color:#06140a;border-radius:9999px;padding:8px 14px;font-size:12px;font-weight:600;font-style:italic}
  .biz-chip.focus{display:inline-flex;align-items:center;gap:5px;background:rgba(59,215,92,.12);border:1px solid rgba(59,215,92,.35);color:var(--green)}
  .biz-chip.focus .p{font-style:normal;font-weight:700}

  .biz-toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 22px 16px;flex-shrink:0;gap:8px}
  .biz-toggle button{background:none;border:none;cursor:pointer;font-family:'Archivo Black';font-size:24px;color:var(--green);padding:6px 4px;transition:all .15s}
  .biz-toggle button.active{background:var(--green);color:#06140a;border-radius:12px;padding:6px 15px}

  .match-strip{background:rgba(164,123,255,.12);border-top:1px solid rgba(164,123,255,.3);padding:10px 22px;display:flex;align-items:center;gap:10px;flex-shrink:0}
  .match-strip .mono{color:var(--purple);font-size:10px}
  .match-strip .why{color:var(--ink);font-size:12px;flex:1}

  /* dots */
  .dots{display:flex;gap:6px;justify-content:center;padding:8px 0 4px;flex-wrap:wrap;flex-shrink:0;max-width:340px;margin:0 auto}
  .dots i{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .2s}
  .dots i.on{background:var(--green);width:20px;border-radius:3px}
  .dots i.ismatch{background:var(--purple)}

  .hint{text-align:center;color:var(--hint);font-size:10px;font-family:'DM Mono';letter-spacing:.1em;text-transform:uppercase;padding:6px 0 calc(var(--safe-bottom) + 14px);flex-shrink:0}

  .nav{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:rgba(26,26,26,.85);border:1px solid var(--border);color:var(--ink);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;opacity:.5;transition:opacity .15s}
  .nav:active{opacity:1}
  .nav.prev{left:6px}.nav.next{right:6px}
</style>
</head>
<body>
<div class="device">
  <div class="topbar">
    <span class="mono" style="font-size:10px;color:var(--muted)">FUTURELAND</span>
    <span class="live mono"><i></i> 8 here</span>
  </div>
  <div class="head">
    <div>
      <div class="eyebrow">Swipe the room</div>
      <h2 class="display">The room</h2>
    </div>
    <div class="counter" id="counter">1 / 8</div>
  </div>

  <div class="deck" id="deck">
    <div class="track" id="track"></div>
    <div class="nav prev" onclick="goTo(idx-1)">‹</div>
    <div class="nav next" onclick="goTo(idx+1)">›</div>
  </div>

  <div class="dots" id="dots"></div>
  <div class="hint">Swipe left or right to move through the room · tap a face to flip</div>
</div>

<script>
const PEOPLE = [
  {nm:"Brent", role:"Founder", agency:"GILCHRIST", ty:"Creative Agency", you:true,
   offers:[["Advice",["fundraising","brand"]],["Mentorship",["design"]]],
   needs:[["Collaboration",["product design","gaming"]],["Work",[]]]},
  {nm:"Maya Okafor", role:"Founder", agency:"NORTHBOUND", ty:"Studio",
   offers:[["Mentorship",["design","early-stage"]],["Introductions",["investors"]]],
   needs:[["Collaboration",["product design"]],["Funding",["pre-seed"]]], match:"You both work in product design"},
  {nm:"Devin Park", role:"Fractional CFO", agency:"LEDGERLINE", ty:"Advisory",
   offers:[["Advice",["fundraising","pricing"]],["Investment",["pre-seed"]]],
   needs:[["Introductions",["founders"]]], match:"He funds what you are raising for"},
  {nm:"Ife Adeyemi", role:"Design lead", agency:"FORM AND CO", ty:"Product Studio",
   offers:[["Feedback",["product","UX"]],["Mentorship",["design"]]],
   needs:[["Collaboration",["gaming"]]], match:"You both want to collaborate on gaming"},
  {nm:"Tomas Rivera", role:"Just exited", agency:"", ty:"",
   offers:[["Investment",["seed"]],["Advice",["go-to-market"]]],
   needs:[["Introductions",["operators"]]]},
  {nm:"Nikki Cho", role:"Engineer", agency:"", ty:"",
   offers:[["Collaboration",["web","3D"]]],
   needs:[["Work",["design"]],["Mentorship",["engineering"]]]},
  {nm:"Lorena Medina", role:"Founder, creative", agency:"MEDINA", ty:"Creative",
   offers:[["Mentorship",["brand"]],["Introductions",["press"]],["Collaboration",["brand"]]],
   needs:[["Advice",["fundraising"]]]},
  {nm:"Toast", role:"Engineer", agency:"", ty:"",
   offers:[["Collaboration",["web"]],["Feedback",["product"]]],
   needs:[["Mentorship",["engineering"]],["Work",[]]]},
];

const track=document.getElementById('track');
const dotsWrap=document.getElementById('dots');
const counter=document.getElementById('counter');
let idx=0;
const faces={};       // remember which face each card is showing

/* build slides */
PEOPLE.forEach((p,i)=>{
  faces[i]='me';
  const slide=document.createElement('div');slide.className='slide';
  slide.innerHTML=
    '<div class="biz'+(p.match?' match':'')+'">'+
      '<div class="biz-head">'+
        '<div class="soda-mark"><i class="d1"></i><i class="d2"></i><i class="d3"></i></div>'+
        '<div class="agency"><div class="nm">'+(p.agency||p.nm.split(' ')[0].toUpperCase())+'</div>'+
          '<div class="ty">'+(p.ty||p.role)+'</div></div>'+
      '</div>'+
      '<div class="biz-body" id="body-'+i+'"></div>'+
      '<div class="biz-toggle">'+
        '<button id="t-'+i+'-offers" onclick="flip('+i+',\'offers\')">Offers</button>'+
        '<button id="t-'+i+'-me" class="active" onclick="flip('+i+',\'me\')">Me</button>'+
        '<button id="t-'+i+'-needs" onclick="flip('+i+',\'needs\')">Needs</button>'+
      '</div>'+
      (p.match?'<div class="match-strip"><span class="mono">Match</span><span class="why">'+p.match+'</span></div>':'')+
    '</div>';
  track.appendChild(slide);
  const dot=document.createElement('i');if(p.match)dot.className='ismatch';dotsWrap.appendChild(dot);
});

function flip(i,f){
  faces[i]=f;
  const p=PEOPLE[i];
  ['offers','me','needs'].forEach(x=>{document.getElementById('t-'+i+'-'+x).className=(x===f?'active':'')});
  const body=document.getElementById('body-'+i);
  if(f==='me'){
    body.innerHTML='<div class="me-face"><div><div class="me-name">'+p.nm.split(' ')[0].toUpperCase()+'</div>'+
      '<div class="me-role">'+p.role+'</div></div>'+
      '<div class="sig"><div class="nm">'+p.nm+'</div><div class="lbl">Signature</div></div></div>';
    return;
  }
  const list=f==='offers'?p.offers:p.needs;
  const cats=list.map(c=>c[0]);
  const focuses=[];list.forEach(c=>c[1].forEach(fo=>{if(focuses.indexOf(fo)<0)focuses.push(fo)}));
  body.innerHTML='<div class="face-name">'+p.nm.split(' ')[0].toUpperCase()+'</div>'+
    '<div class="face-section">'+(f==='offers'?'Offers:':'Needs')+'</div>'+
    '<div class="biz-chips">'+(cats.length?cats.map(c=>'<span class="biz-chip">'+c+'</span>').join(''):'<span style="color:var(--hint);font-size:13px">nothing added</span>')+'</div>'+
    (focuses.length?'<div class="face-section" style="margin-top:16px">in:</div><div class="biz-chips">'+focuses.map(fo=>'<span class="biz-chip focus"><span class="p">+</span> '+fo+'</span>').join('')+'</div>':'');
}
PEOPLE.forEach((p,i)=>flip(i,'me'));

function update(){
  track.style.transition='transform .34s cubic-bezier(.22,1,.36,1)';
  track.style.transform='translateX('+(-idx*100)+'%)';
  counter.textContent=(idx+1)+' / '+PEOPLE.length;
  [...dotsWrap.children].forEach((d,i)=>d.classList.toggle('on',i===idx));
}
function goTo(n){idx=Math.max(0,Math.min(PEOPLE.length-1,n));update();}
[...dotsWrap.children].forEach((d,i)=>d.onclick=()=>goTo(i));
update();

/* ===== finger swipe ===== */
const deck=document.getElementById('deck');
let startX=0,startY=0,dx=0,dragging=false,decided=false,horizontal=false;
const W=()=>deck.clientWidth;

function down(e){
  const t=e.touches?e.touches[0]:e;
  startX=t.clientX;startY=t.clientY;dx=0;dragging=true;decided=false;horizontal=false;
  track.style.transition='none';
}
function moveH(e){
  if(!dragging)return;
  const t=e.touches?e.touches[0]:e;
  const mx=t.clientX-startX, my=t.clientY-startY;
  if(!decided){
    if(Math.abs(mx)>8||Math.abs(my)>8){decided=true;horizontal=Math.abs(mx)>Math.abs(my);}
  }
  if(!horizontal)return;
  if(e.cancelable)e.preventDefault();
  dx=mx;
  // rubber-band at the ends
  let base=-idx*W();
  if((idx===0&&dx>0)||(idx===PEOPLE.length-1&&dx<0)) dx*=0.35;
  track.style.transform='translateX('+(base+dx)+'px)';
}
function up(){
  if(!dragging)return;dragging=false;
  if(horizontal){
    const threshold=W()*0.22;
    if(dx<-threshold) idx=Math.min(PEOPLE.length-1,idx+1);
    else if(dx>threshold) idx=Math.max(0,idx-1);
  }
  update();
}
deck.addEventListener('touchstart',down,{passive:true});
deck.addEventListener('touchmove',moveH,{passive:false});
deck.addEventListener('touchend',up);
deck.addEventListener('mousedown',e=>{down(e);e.preventDefault();});
window.addEventListener('mousemove',moveH);
window.addEventListener('mouseup',up);
/* keyboard for desktop testing */
window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')goTo(idx-1);if(e.key==='ArrowRight')goTo(idx+1);});
</script>
</body>
</html>
