<!-- @dsCard group="Attendee App" viewport="1400x900" name="New Screens — gallery" subtitle="All Screens overview + the 10 new screens by flow: Access & Sessions, Event Mode, Host Access, Collaborator Onboarding" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SODA · New Screens — Gallery</title>
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg-deep); }
  .soda-scroll::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<script type="text/babel" src="frames.jsx"></script>
<script type="text/babel" src="kit.jsx"></script>
<script type="text/babel" src="access.jsx"></script>
<script type="text/babel" src="host.jsx"></script>
<script type="text/babel" src="collab.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const {
  PhoneFrame, TabletFrame, AdminShell,
  CodeHelp, WelcomeBack, AddToHome,
  EventModeControl, HostSignIn, HostAccountSetup, CollaboratorManagement,
  CollaboratorWelcome, CollaboratorTutorial, HostWelcomeBack,
} = window;

/* dark padded board so the device bezel shadow has room */
function Board({ children, pad = 30 }) {
  return (
    <div style={{ width: '100%', height: '100%', boxSizing: 'border-box', background: 'var(--bg-deep)',
      display: 'flex', alignItems: 'center', justifyContent: 'center', padding: pad }}>
      {children}
    </div>
  );
}

/* device dimensions → artboard size (device outer + 2·pad) */
const PHONE = { w: 458, h: 858 };
const TABLET = { w: 704, h: 920 };
const ADMIN = { w: 940, h: 700 };

/* ---- Overview thumbnails: every screen scaled down to scan at a glance ---- */
const DEV = { phone: { w: 398, h: 798 }, tablet: { w: 644, h: 864 }, admin: { w: 882, h: 622 } };
const THUMB_SCALE = 0.4;
const THUMB_PAD = 12;
const thumbW = (dev) => Math.round(DEV[dev].w * THUMB_SCALE) + THUMB_PAD * 2;
const thumbH = (dev) => Math.round(DEV[dev].h * THUMB_SCALE) + THUMB_PAD * 2;

function Thumb({ dev, children }) {
  const { w, h } = DEV[dev];
  return (
    <div style={{ width: '100%', height: '100%', boxSizing: 'border-box', background: 'var(--bg-deep)',
      display: 'flex', alignItems: 'center', justifyContent: 'center', padding: THUMB_PAD }}>
      <div style={{ width: w * THUMB_SCALE, height: h * THUMB_SCALE, flex: '0 0 auto' }}>
        <div style={{ width: w, height: h, transform: `scale(${THUMB_SCALE})`, transformOrigin: 'top left' }}>
          {children}
        </div>
      </div>
    </div>
  );
}

/* one source of truth for the overview row */
const ALL = [
  { id: 'code-help', label: '01 · Code help', dev: 'phone', el: <PhoneFrame statusHost="Futureland"><CodeHelp /></PhoneFrame> },
  { id: 'welcome-back', label: '02 · Welcome back', dev: 'phone', el: <PhoneFrame statusHost="Futureland"><WelcomeBack /></PhoneFrame> },
  { id: 'add-to-home', label: '03 · Add to home', dev: 'phone', el: <PhoneFrame><AddToHome /></PhoneFrame> },
  { id: 'event-mode', label: '04 · Event Mode', dev: 'admin', el: <AdminShell height={620}><EventModeControl /></AdminShell> },
  { id: 'host-signin', label: '05 · Host sign-in', dev: 'tablet', el: <TabletFrame statusHost="Futureland"><HostSignIn /></TabletFrame> },
  { id: 'host-setup', label: '06 · Host account setup', dev: 'tablet', el: <TabletFrame statusHost="Futureland"><HostAccountSetup /></TabletFrame> },
  { id: 'collab-mgmt', label: '07 · Collaborator mgmt', dev: 'admin', el: <AdminShell height={620}><CollaboratorManagement /></AdminShell> },
  { id: 'collab-welcome', label: '08 · Collaborator welcome', dev: 'phone', el: <PhoneFrame statusHost="Futureland"><CollaboratorWelcome /></PhoneFrame> },
  { id: 'collab-tutorial', label: '09 · Collaborator tutorial', dev: 'phone', el: <PhoneFrame statusHost="Futureland"><CollaboratorTutorial /></PhoneFrame> },
  { id: 'host-welcome-back', label: '10 · Host welcome-back', dev: 'tablet', el: <TabletFrame statusHost="Futureland"><HostWelcomeBack /></TabletFrame> },
];

function App() {
  return (
    <DesignCanvas>
      <DCSection id="all-screens" title="All Screens" subtitle="Every new screen across all four flows, at a glance">
        {ALL.map((s) => (
          <DCArtboard key={s.id} id={`all-${s.id}`} label={s.label} width={thumbW(s.dev)} height={thumbH(s.dev)} style={{ background: 'var(--bg-deep)' }}>
            <Thumb dev={s.dev}>{s.el}</Thumb>
          </DCArtboard>
        ))}
      </DCSection>

      <DCSection id="access" title="Access & Sessions" subtitle="Getting in, getting back in">
        <DCArtboard id="code-help" label="01 · Code help state" width={PHONE.w} height={PHONE.h} style={{ background: 'var(--bg-deep)' }}>
          <Board><PhoneFrame statusHost="Futureland"><CodeHelp /></PhoneFrame></Board>
        </DCArtboard>
        <DCArtboard id="welcome-back" label="02 · Welcome back (re-auth)" width={PHONE.w} height={PHONE.h} style={{ background: 'var(--bg-deep)' }}>
          <Board><PhoneFrame statusHost="Futureland"><WelcomeBack /></PhoneFrame></Board>
        </DCArtboard>
        <DCArtboard id="add-to-home" label="03 · Add to home screen" width={PHONE.w} height={PHONE.h} style={{ background: 'var(--bg-deep)' }}>
          <Board><PhoneFrame><AddToHome /></PhoneFrame></Board>
        </DCArtboard>
      </DCSection>

      <DCSection id="event-mode" title="Event Mode" subtitle="Host setup — Full or Simple">
        <DCArtboard id="event-mode-ctrl" label="04 · Event Mode control" width={ADMIN.w} height={ADMIN.h} style={{ background: 'var(--bg-deep)' }}>
          <Board pad={26}><AdminShell><EventModeControl /></AdminShell></Board>
        </DCArtboard>
      </DCSection>

      <DCSection id="host-access" title="Host Access" subtitle="Sign-in, account setup, collaborators">
        <DCArtboard id="host-signin" label="05 · Host sign-in" width={TABLET.w} height={TABLET.h} style={{ background: 'var(--bg-deep)' }}>
          <Board><TabletFrame statusHost="Futureland"><HostSignIn /></TabletFrame></Board>
        </DCArtboard>
        <DCArtboard id="host-setup" label="06 · Host account setup" width={TABLET.w} height={TABLET.h} style={{ background: 'var(--bg-deep)' }}>
          <Board><TabletFrame statusHost="Futureland"><HostAccountSetup /></TabletFrame></Board>
        </DCArtboard>
        <DCArtboard id="collab-mgmt" label="07 · Collaborator management" width={ADMIN.w} height={ADMIN.h} style={{ background: 'var(--bg-deep)' }}>
          <Board pad={26}><AdminShell><CollaboratorManagement /></AdminShell></Board>
        </DCArtboard>
      </DCSection>

      <DCSection id="collab-onboarding" title="Collaborator Onboarding" subtitle="Welcomed, oriented, routed">
        <DCArtboard id="collab-welcome" label="08 · Collaborator welcome" width={PHONE.w} height={PHONE.h} style={{ background: 'var(--bg-deep)' }}>
          <Board><PhoneFrame statusHost="Futureland"><CollaboratorWelcome /></PhoneFrame></Board>
        </DCArtboard>
        <DCArtboard id="collab-tutorial" label="09 · Collaborator tutorial" width={PHONE.w} height={PHONE.h} style={{ background: 'var(--bg-deep)' }}>
          <Board><PhoneFrame statusHost="Futureland"><CollaboratorTutorial /></PhoneFrame></Board>
        </DCArtboard>
        <DCArtboard id="host-welcome-back" label="10 · Host welcome-back" width={TABLET.w} height={TABLET.h} style={{ background: 'var(--bg-deep)' }}>
          <Board><TabletFrame statusHost="Futureland"><HostWelcomeBack /></TabletFrame></Board>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
