<!-- @dsCard group="Type" viewport="700x230" name="Display — Archivo Black" subtitle="Heavy, UPPERCASE, tight. The emotional voice — greetings, headlines, numbers." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 24px; color: var(--text-primary); }
  .d { font-family: var(--font-display); text-transform: uppercase; letter-spacing: -.01em; line-height: 1; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin: 4px 0 18px; text-transform: uppercase; letter-spacing: 1px; }
  .num { color: var(--accent); }
</style>
</head>
<body>
<div class="d" style="font-size:40px">The room is filling</div>
<div class="meta">Headline · 24–40px · Archivo Black</div>
<div class="d" style="font-size:26px">Welcome back, Maya</div>
<div class="meta">Greeting · 24–26px</div>
<div class="d" style="font-size:30px"><span class="num">12</span> <span style="font-size:15px;color:var(--text-muted);font-family:var(--font-mono)">MET</span></div>
<div class="meta">Stat number · green, with mono unit</div>
</body>
</html>
