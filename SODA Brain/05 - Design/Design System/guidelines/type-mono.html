<!-- @dsCard group="Type" viewport="700x200" name="Mono — DM Mono" subtitle="The system voice: eyebrows, labels, meta, counts. UPPERCASE, letter-spaced." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 24px; font-family: var(--font-mono); }
  .stack > div { margin-bottom: 14px; }
  .eyebrow { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); }
  .label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }
  .meta { font-size: 11px; color: var(--text-muted); }
  .note { font-family: var(--font-mono); font-size: 9px; color: var(--text-faint); letter-spacing: 1px; }
</style>
</head>
<body>
<div class="stack">
  <div><span class="eyebrow">SODA ✦ COMPONENT INVENTORY</span><div class="note">Brand eyebrow · 3px tracking · green</div></div>
  <div><span class="label">PEOPLE YOU SYNCED WITH</span><div class="note">Section label · 1.5px tracking · muted</div></div>
  <div><span class="meta">Met at Creative Meetup · Cleveland</span><div class="note">Meta line · sentence-ish, muted</div></div>
  <div><span class="meta" style="color:var(--accent)">3 HERE</span> &nbsp; <span class="meta" style="color:var(--text-primary)">14 RESPONSES</span><div class="note">Live counts</div></div>
</div>
</body>
</html>
