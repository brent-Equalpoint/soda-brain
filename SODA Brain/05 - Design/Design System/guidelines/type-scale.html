<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="The sizes actually used across the spine, largest to smallest" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 22px 24px; font-family: var(--font-sans); }
  table { border-collapse: collapse; width: 100%; max-width: 640px; }
  td { padding: 7px 0; border-bottom: 1px solid var(--border); vertical-align: baseline; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 130px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--accent); width: 56px; text-align: right; }
  .samp { color: var(--text-primary); padding-left: 18px; }
</style>
</head>
<body>
<table>
  <tr><td class="tok">--fs-display-l</td><td class="px">26</td><td class="samp" style="font-family:var(--font-display);text-transform:uppercase;font-size:24px">Headline</td></tr>
  <tr><td class="tok">--fs-stat</td><td class="px">30</td><td class="samp" style="font-family:var(--font-display);font-size:24px;color:var(--accent)">128</td></tr>
  <tr><td class="tok">--fs-lg</td><td class="px">17</td><td class="samp" style="font-size:17px;font-weight:600">Header name</td></tr>
  <tr><td class="tok">--fs-md</td><td class="px">15</td><td class="samp" style="font-size:15px">Default body / list item</td></tr>
  <tr><td class="tok">--fs-sm</td><td class="px">13</td><td class="samp" style="font-size:13px">Secondary copy</td></tr>
  <tr><td class="tok">--fs-label</td><td class="px">11</td><td class="samp" style="font-family:var(--font-mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted)">Mono label</td></tr>
  <tr><td class="tok">--fs-nano</td><td class="px">9</td><td class="samp" style="font-family:var(--font-mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted)">Tiny tag</td></tr>
</table>
</body>
</html>
