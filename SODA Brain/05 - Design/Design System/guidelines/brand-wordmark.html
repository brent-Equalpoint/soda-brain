<!-- @dsCard group="Brand" viewport="700x180" name="Wordmark" subtitle="The wordmark IS the logo — Archivo Black + the four-pointed sparkle ✦. No image file." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-deep); padding: 28px; color: var(--text-primary); }
  .wm { font-family: var(--font-display); text-transform: uppercase; letter-spacing: -.01em; display: flex; align-items: center; gap: 12px; }
  .star { color: var(--accent); }
  .row { display: flex; align-items: center; gap: 40px; flex-wrap: wrap; }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); }
  .note { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 18px; letter-spacing: .5px; }
</style>
</head>
<body>
<div class="row">
  <div class="wm" style="font-size:44px">SODA <span class="star">✦</span></div>
  <div>
    <div class="eyebrow">SODA ✦ THE EVENT LAYER</div>
    <div style="height:10px"></div>
    <div class="wm" style="font-size:20px;color:var(--text-secondary)">SODA <span class="star">✦</span></div>
  </div>
</div>
<div class="note">Host events replace the wordmark with their own name (Archivo Black) or uploaded logo. SODA steps back to the quiet platform role.</div>
</body>
</html>
