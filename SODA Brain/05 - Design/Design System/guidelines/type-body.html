<!-- @dsCard group="Type" viewport="700x250" name="Body — DM Sans" subtitle="Everything readable. Paragraphs lean light (300); emphasis at 600/700." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 24px; font-family: var(--font-sans); }
  p { margin: 0 0 4px; color: var(--text-secondary); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin: 0 0 16px; text-transform: uppercase; letter-spacing: 1px; }
  .light { font-weight: 300; font-size: 15px; max-width: 560px; }
  b { color: var(--text-primary); font-weight: 600; }
</style>
</head>
<body>
<p class="light">You came to find <b>engineers</b> and <b>pre-seed</b>. Three people from your events fit. Tap Contacts to follow up.</p>
<div class="meta">Body · 15px · weight 300, emphasis 600</div>
<p style="font-weight:300;color:var(--text-secondary)">Light 300 — long-form body</p>
<p style="font-weight:400;color:var(--text-secondary)">Regular 400</p>
<p style="font-weight:500;color:var(--text-primary)">Medium 500</p>
<p style="font-weight:600;color:var(--text-primary)">Semibold 600 — names, buttons</p>
<p style="font-weight:700;color:var(--text-primary)">Bold 700 — header names</p>
<div class="meta" style="margin-top:12px">DM Sans · 300 / 400 / 500 / 600 / 700</div>
</body>
</html>
