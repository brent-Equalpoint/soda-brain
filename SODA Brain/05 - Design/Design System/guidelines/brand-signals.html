<!-- @dsCard group="Brand" viewport="700x220" name="Signals & status dots" subtitle="Meaning is carried by word + color, not icons. Green confirms, purple nudges." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 22px 24px; font-family: var(--font-sans); }
  .grp { margin-bottom: 18px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .sig { font-family: var(--font-mono); font-size: 9px; letter-spacing: .5px; text-transform: uppercase; padding: 4px 9px; border-radius: var(--r-pill); }
  .saved { color: var(--text-muted); background: var(--surface-2); }
  .reached { color: var(--accent); background: var(--accent-soft); }
  .nudge { color: var(--private); background: var(--private-soft); }
  .just { color: var(--text-muted); background: var(--surface-2); }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .tag { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-secondary); }
</style>
</head>
<body>
<div class="grp">
  <div class="lbl">Contact signals</div>
  <div class="row">
    <span class="sig just">Just met</span>
    <span class="sig saved">Saved</span>
    <span class="sig reached">Reached out</span>
    <span class="sig nudge">Reach out</span>
  </div>
</div>
<div class="grp">
  <div class="lbl">Status dots</div>
  <div class="row" style="gap:22px">
    <span class="tag"><span class="dot" style="background:var(--accent)"></span> Live / present</span>
    <span class="tag"><span class="dot" style="background:var(--private)"></span> Waiting nudge</span>
    <span class="tag"><span class="dot" style="background:var(--warn)"></span> Cooling</span>
    <span class="tag"><span class="dot" style="background:var(--pending)"></span> Specified</span>
  </div>
</div>
<div class="grp" style="margin-bottom:0">
  <div class="lbl">Warmth ramp · green → amber → purple as a contact cools</div>
  <div class="row" style="gap:6px;align-items:center">
    <span class="dot" style="background:var(--accent)"></span>
    <span class="dot" style="background:#9ad24a"></span>
    <span class="dot" style="background:var(--warn)"></span>
    <span class="dot" style="background:#c79a8f"></span>
    <span class="dot" style="background:var(--private)"></span>
  </div>
</div>
</body>
</html>
