<!-- @dsCard group="Colors" viewport="700x210" name="Meaningful color" subtitle="Each color has one job: green=interactive, purple=private, amber=time, red=errors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 22px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { width: 150px; }
  .chip { height: 64px; border-radius: var(--r-lg); display: flex; align-items: flex-end; padding: 9px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .nm { font-size: 12px; color: var(--text-primary); margin-top: 8px; font-weight: 600; }
  .role { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--accent)"><span class="hex" style="color:var(--on-accent)">#3BD75C</span></div><div class="nm">Green</div><div class="role">Interactive · alive · present</div></div>
  <div class="sw"><div class="chip" style="background:var(--private)"><span class="hex" style="color:var(--on-private)">#A47BFF</span></div><div class="nm">Purple</div><div class="role">Private · for you only</div></div>
  <div class="sw"><div class="chip" style="background:var(--warn)"><span class="hex" style="color:#111">#F59E0B</span></div><div class="nm">Amber</div><div class="role">Live time · cooling</div></div>
  <div class="sw"><div class="chip" style="background:var(--danger)"><span class="hex" style="color:#111">#FF5470</span></div><div class="nm">Red</div><div class="role">Errors only</div></div>
  <div class="sw">
    <div class="chip" style="background:var(--surface-green);border:1px solid transparent"><span class="hex" style="color:var(--accent-bright)">#203229</span></div>
    <div class="nm">Deep green</div><div class="role">Insight surface</div>
  </div>
  <div class="sw">
    <div class="chip" style="background:var(--surface-purple);border:1px solid var(--private-border)"><span class="hex" style="color:var(--private)">#1c1726</span></div>
    <div class="nm">Purple-black</div><div class="role">Private container</div>
  </div>
</div>
</body>
</html>
