<!-- @dsCard group="Spacing" viewport="700x180" name="Corner radii" subtitle="Generous corners; pills are fully round; the only sharp thing is a hairline" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 24px; font-family: var(--font-mono); }
  .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
  .box { width: 78px; height: 60px; background: var(--surface-1); border: 1px solid var(--border-strong); }
  .nm { font-size: 10px; color: var(--text-muted); margin-top: 8px; }
  .v { font-size: 11px; color: var(--text-primary); }
  .pill { width: 96px; border-radius: var(--r-pill); display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:11px; }
</style>
</head>
<body>
<div class="row">
  <div><div class="box" style="border-radius:var(--r-xs)"></div><div class="v">8</div><div class="nm">r-xs · tiles</div></div>
  <div><div class="box" style="border-radius:var(--r-md)"></div><div class="v">11</div><div class="nm">r-md · buttons</div></div>
  <div><div class="box" style="border-radius:var(--r-lg)"></div><div class="v">13</div><div class="nm">r-lg · cards</div></div>
  <div><div class="box" style="border-radius:var(--r-xl)"></div><div class="v">15</div><div class="nm">r-xl · panels</div></div>
  <div><div class="box pill">pill</div><div class="v">100</div><div class="nm">r-pill · chips</div></div>
  <div><div class="box" style="border-radius:50%;width:60px"></div><div class="v">50%</div><div class="nm">r-full · avatars</div></div>
</div>
</body>
</html>
