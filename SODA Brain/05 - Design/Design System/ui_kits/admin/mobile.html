<!-- @dsCard group="Admin Panel" viewport="430x860" name="Admin Panel — mobile" subtitle="The back office on a phone: lifecycle control, tab strip, stacked panels" -->
<!-- @startingPoint section="Admin Panel" subtitle="The host's back office, mobile" viewport="430x860" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SODA · Admin · Mobile</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0;background:var(--bg-deep);min-height:100vh;display:flex;justify-content:center;padding:24px 12px 48px;}
  .phone{width:390px;max-width:100%;background:#000;border:9px solid #1c1d1c;border-radius:var(--r-device);overflow:hidden;box-shadow:var(--shadow-device);}
  .screen{background:var(--bg-canvas);height:800px;display:flex;flex-direction:column;overflow:hidden;position:relative;}
  .statusbar{flex:0 0 auto;height:34px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
  .hdr{flex:0 0 auto;padding:6px 16px 12px;border-bottom:1px solid var(--border);}
  .hrow{display:flex;align-items:center;gap:10px;}
  .brand{display:flex;align-items:center;gap:7px;font-family:var(--font-display);text-transform:uppercase;font-size:16px;color:var(--text-primary);letter-spacing:-.01em;}
  .brand .s{color:var(--accent);}
  .evt{font-family:var(--font-mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-top:2px;}
  .lifecycle{display:flex;gap:6px;margin-top:12px;}
  .lc{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 0;border-radius:var(--r-pill);font-family:var(--font-mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;border:1px solid var(--border);color:var(--text-faint);}
  .lc.on.draft{color:var(--pending);border-color:var(--pending);background:rgba(255,210,63,.1);}
  .lc.on.live{color:var(--accent);border-color:var(--accent);background:var(--accent-soft);}
  .lc.on.closed{color:var(--text-secondary);border-color:var(--border-strong);background:var(--surface-2);}
  .tabstrip{flex:0 0 auto;display:flex;gap:7px;overflow-x:auto;padding:11px 16px;border-bottom:1px solid var(--border);scrollbar-width:none;}
  .tabstrip::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto;font-family:var(--font-sans);font-size:13px;font-weight:600;padding:7px 13px;border-radius:var(--r-pill);cursor:pointer;border:1px solid var(--border-strong);white-space:nowrap;}
  .body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;}
  .seam{display:flex;flex-direction:column;gap:12px;background:var(--surface-1);border:1px dashed var(--border-strong);border-radius:var(--r-xl);padding:16px 18px;}
  .toast{position:absolute;left:50%;bottom:30px;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--accent);color:var(--text-primary);font-size:13px;padding:11px 18px;border-radius:var(--r-pill);box-shadow:var(--shadow-toast);display:flex;align-items:center;gap:8px;z-index:80;white-space:nowrap;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="admin.jsx"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js" crossorigin="anonymous"></script>
<script type="text/babel" src="panels.jsx"></script>
<script type="text/babel">
const { EventSetup, CheckIn, ChipQueue, MatchesPanel, ExportPanel, QRPanel, AButton, PhasePills, LifecycleSeam } = window;
const TABS=[['setup','Event'],['qr','QR'],['checkin','Check-in'],['chips','Chips'],['matches','Matches'],['export','Export']];

function App(){
  const [view,setView]=React.useState('setup');
  // Same persisted lifecycle the desktop Admin and the cockpit read.
  const PHASE_KEY='soda.eventPhase';
  const [phase,setPhaseRaw]=React.useState(()=>{
    try{const v=localStorage.getItem(PHASE_KEY);return ['draft','live','closed','cancelled'].includes(v)?v:'draft';}catch(e){return 'draft';}
  });
  const setPhase=(p)=>{setPhaseRaw(p);try{localStorage.setItem(PHASE_KEY,p);}catch(e){}};
  const [toast,setToast]=React.useState(null);
  const flash=(m)=>{setToast(m);clearTimeout(window.__t);window.__t=setTimeout(()=>setToast(null),1800);};
  let main;
  if(view==='setup') main=<EventSetup onToast={flash} phase={phase}/>;
  else if(view==='qr') main=<QRPanel onToast={flash}/>;
  else if(view==='checkin') main=<CheckIn onToast={flash}/>;
  else if(view==='chips') main=<ChipQueue onToast={flash}/>;
  else if(view==='matches') main=<MatchesPanel empty={phase==='draft'}/>;
  else main=<ExportPanel onToast={flash} empty={phase==='draft'}/>;

  return (
    <div className="phone"><div className="screen">
      <div className="statusbar"><span>9:41</span><span style={{fontSize:9,letterSpacing:'1px'}}>FUTURELAND</span><span>● ● ●</span></div>
      <div className="hdr">
        <div className="hrow">
          <div><div className="brand">SODA <span className="s">✦</span></div><div className="evt">Admin · Creative Meetup</div></div>
        </div>
        <div className="lifecycle">
          <PhasePills phase={phase}/>
        </div>
      </div>
      <div className="tabstrip">
        {TABS.map(([id,lb])=>(
          <button key={id} className="tab" onClick={()=>setView(id)}
            style={{background:view===id?'var(--accent)':'var(--surface-1)',color:view===id?'var(--on-accent)':'var(--text-muted)',borderColor:view===id?'var(--accent)':'var(--border-strong)'}}>{lb}</button>
        ))}
      </div>
      <div className="body soda-scroll">
        {main}
        <LifecycleSeam phase={phase} setPhase={setPhase} flash={flash} layout="mobile"/>
      </div>
      {toast&&<div className="toast"><span style={{width:7,height:7,borderRadius:'50%',background:'var(--accent)'}}/>{toast}</div>}
    </div></div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
