<!-- @dsCard group="Components" viewport="700x230" name="Feedback — Toast & Progress" subtitle="Confirmation toasts and the survey progress / warmth bar" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 24px; }
  .col { display: flex; flex-direction: column; gap: 16px; max-width: 420px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Toast, ProgressBar } = window.SODADesignSystem_3bd687;
  function Demo() {
    return (
      <div className="col">
        <div className="lbl">Toasts</div>
        <div className="row">
          <Toast message="Card saved" />
          <Toast message="Nudge sent" tone="purple" />
        </div>
        <div className="lbl" style={{ marginTop: 8 }}>Survey progress · 3 of 6</div>
        <ProgressBar value={3} max={6} />
        <div className="lbl" style={{ marginTop: 8 }}>Warmth · cooling</div>
        <ProgressBar ratio={0.78} color="var(--warn)" height={7} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
