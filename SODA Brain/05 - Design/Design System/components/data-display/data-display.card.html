<!-- @dsCard group="Components" viewport="700x480" name="Data display — Avatar, Badge, Stat, Contact, Event" subtitle="Identity avatars, status & signal pills, live stats, contact rows, event cards" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 26px 30px; max-width: 660px; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .span { grid-column: 1 / -1; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Avatar, Badge, StatTile, ContactRow, EventCard } = window.SODADesignSystem_3bd687;
  function Demo() {
    return (
      <div className="grid">
        <div className="col">
          <div className="lbl">Avatars · initials fallback</div>
          <div className="row">
            <Avatar name="Maya Chen" size={48} />
            <Avatar name="Jordan Blake" size={48} />
            <Avatar name="Priya Nair" size={48} />
            <Avatar name="Devon Carter" size={48} />
          </div>
        </div>
        <div className="col">
          <div className="lbl">Badges · status & signal</div>
          <div className="row">
            <Badge status="built">Built</Badge>
            <Badge status="spec">Specified</Badge>
          </div>
          <div className="row">
            <Badge signal="saved">Saved</Badge>
            <Badge signal="reached">Reached out</Badge>
            <Badge signal="nudge">Reach out</Badge>
          </div>
        </div>

        <div className="col span">
          <div className="lbl">Live stat bar</div>
          <div className="row">
            <StatTile value={128} label="Scanned in" />
            <StatTile value={94} label="Responses" />
            <StatTile value={42} label="Pairs" />
            <StatTile value={17} label="Nudges" />
            <StatTile value="71%" label="Surveys" />
          </div>
        </div>

        <div className="col">
          <div className="lbl">Contact rows</div>
          <ContactRow name="Jordan Blake" role="Investor" metAt="Creative Meetup, Cleveland" signal="saved" />
          <ContactRow name="Priya Nair" role="Designer" metAt="Cleveland" signal="reached" warmthColor="var(--accent)" />
          <ContactRow name="Tasha Boyd" role="Founder" metAt="Cleveland" signal="nudge" warmthColor="var(--private)" />
        </div>
        <div className="col">
          <div className="lbl">Event cards</div>
          <div className="row">
            <EventCard host="Futureland" name="Creative Meetup" date="Mar 14" met={12} />
            <EventCard host="Black Tech Week" name="BTW Activation" date="Jan 20" met={15} />
          </div>
          <EventCard variant="row" host="Equalpoint" name="Founder Mixer" date="Feb 02" where="Cleveland" met={8} recap />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
