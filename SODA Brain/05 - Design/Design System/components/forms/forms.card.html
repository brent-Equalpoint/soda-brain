<!-- @dsCard group="Components" viewport="700x440" name="Forms — Button, Chip, Input, Code" subtitle="Green primary, ghost & private variants, pills, fields, the 6-digit code" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 24px; }
  .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 26px 32px; max-width: 660px; }
  .col { display: flex; flex-direction: column; gap: 14px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, Chip, Input, CodeInput } = window.SODADesignSystem_3bd687;
  function Demo() {
    const [role, setRole] = React.useState('Founder');
    const [offers, setOffers] = React.useState(['Intros']);
    const [code, setCode] = React.useState('4172');
    const toggle = (v) => setOffers((o) => o.includes(v) ? o.filter(x => x !== v) : [...o, v]);
    return (
      <div className="wrap">
        <div className="col">
          <div className="lbl">Buttons</div>
          <div className="row"><Button variant="primary">Enter the room</Button></div>
          <div className="row">
            <Button variant="ghost" icon="←">Back</Button>
            <Button variant="purple">Saved ✓</Button>
          </div>
          <div className="row">
            <Button variant="primary" size="sm">Reach out</Button>
            <Button variant="primary" disabled>Reached out</Button>
          </div>
        </div>

        <div className="col">
          <div className="lbl">Chips · Role / Offer / Need</div>
          <div className="row">
            {['Founder', 'Designer', 'Investor'].map(r => (
              <Chip key={r} selected={role === r} onClick={() => setRole(r)}>{r}</Chip>
            ))}
          </div>
          <div className="row">
            {['Intros', 'Advice', 'Hiring', 'Capital'].map(o => (
              <Chip key={o} selected={offers.includes(o)} onClick={() => toggle(o)}>{o}</Chip>
            ))}
            <Chip writeIn>Add your own</Chip>
          </div>
        </div>

        <div className="col">
          <div className="lbl">Inputs</div>
          <Input label="Email" defaultValue="maya@futureland.com" />
          <Input label="Code" error="That code did not match. Resend." />
        </div>

        <div className="col">
          <div className="lbl">Code entry · Sign-In</div>
          <CodeInput length={6} value={code} onChange={setCode} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
